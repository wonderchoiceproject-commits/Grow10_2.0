<!DOCTYPE html>
<html lang="ja" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>360度評価ダッシュボード</title>
  
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel for in-browser JSX compilation -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #475569; }
    body { background-color: #020617; color: #e2e8f0; }
    .loader {
      border: 4px solid rgba(255, 255, 255, 0.1);
      border-left-color: #22d3ee;
      border-radius: 50%;
      width: 40px; height: 40px;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useMemo, useState, useEffect } = React;

    // ▼▼▼ ここにGASで取得した「ウェブアプリのURL」を貼り付けてください ▼▼▼
    const GAS_WEBAPP_URL = "https://script.google.com/macros/s/AKfycbyBKhGV3I7LuBMtHN7dvYFHOrddAChxRKig3rIq-EKYHYZS6bF1x0dHsZZumj9ampk/exec";
    // ▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲▲

    // 評価項目
    const topics = [
      '協調性', '素直さ', '積極性', '明るさ', '礼儀正しさ', 
      '清潔さ', '正確さ', '懸命さ', '柔軟性', 'ホスピタリティー'
    ];

    // 「総合」を含む全カラム（順位計算対象）
    const allColumns = ['総合', ...topics];

    // ========================================================
    // 順位計算ヘルパー（Top1 / Top3 / Bottom3 フラグ付き）
    // ========================================================
    function computeRanksAndFlags(resultList, columns) {
      columns.forEach(col => {
        // --- トップ順位（降順） ---
        const sortedDesc = [...resultList].sort((a, b) => b.avgScores[col] - a.avgScores[col]);
        let currentRank = 1, prevScore = null;
        sortedDesc.forEach((emp, idx) => {
          if (emp.avgScores[col] !== prevScore) currentRank = idx + 1;
          const target = resultList.find(e => e.empId === emp.empId);
          target.ranks[col] = currentRank;
          target.flags[col] = {
            isTop1: currentRank === 1,
            isTop3: currentRank > 1 && currentRank <= 3,
            isBottom3: false
          };
          prevScore = emp.avgScores[col];
        });

        // --- ワースト順位（昇順） ---
        const sortedAsc = [...resultList].sort((a, b) => a.avgScores[col] - b.avgScores[col]);
        let bottomRank = 1, bottomPrev = null;
        sortedAsc.forEach((emp, idx) => {
          if (emp.avgScores[col] !== bottomPrev) bottomRank = idx + 1;
          if (bottomRank <= 3) {
            const target = resultList.find(e => e.empId === emp.empId);
            target.flags[col].isBottom3 = true;
          }
          bottomPrev = emp.avgScores[col];
        });
      });
    }


    // ========================================================
    // メインコンポーネント
    // ========================================================
    const DashboardGrid = () => {
      const [apiData, setApiData] = useState(null);     // GASからの生レスポンス
      const [isLoading, setIsLoading] = useState(true);
      const [error, setError] = useState(null);
      const [selectedDeptId, setSelectedDeptId] = useState(null); // null = 全員

      // --- データ取得 ---
      useEffect(() => {
        if (!GAS_WEBAPP_URL || GAS_WEBAPP_URL === "ここにURLを貼り付けてください") {
          setError("WebアプリのURLが未設定です。コード先頭の GAS_WEBAPP_URL にURLを設定してください。");
          setIsLoading(false);
          return;
        }

        const fetchUrl = GAS_WEBAPP_URL.includes('?') 
          ? `${GAS_WEBAPP_URL}&action=getDashboardRawData` 
          : `${GAS_WEBAPP_URL}?action=getDashboardRawData`;

        fetch(fetchUrl)
          .then(res => res.json())
          .then(data => {
            if (data.error) throw new Error(data.error);
            setApiData(data);
            setIsLoading(false);
          })
          .catch(err => {
            console.error("Fetch error:", err);
            setError(`GASからのデータ取得に失敗しました。\n詳細: ${err.message}\n\nGASのデプロイ設定で「アクセスできるユーザー」が「全員」になっているか確認してください。`);
            setIsLoading(false);
          });
      }, []);


      // --- 集計ロジック（apiData または selectedDeptId 変化時に再計算） ---
      const { processedData, featuredDepts, activeDeptName } = useMemo(() => {
        if (!apiData) return { processedData: [], featuredDepts: [], activeDeptName: '' };

        const { evaluations = [], members = [], featuredDepartments = [] } = apiData;
        // featuredDepartments は [{id, name}, ...] 形式
        const featuredDepts = featuredDepartments;

        // 1. メンバー辞書を構築: squadNumber → { name, departmentIds[] }
        const memberMap = {};
        members.forEach(m => {
          const sq = String(m.squadNumber).trim();
          if (!sq) return;
          memberMap[sq] = {
            name: m.name || sq,
            departmentIds: String(m.departmentIds || '')
              .split(',')
              .map(d => d.trim())
              .filter(d => d !== '')
          };
        });

        // 2. selectedDeptId に基づいて対象メンバーを特定
        //    null = 全員、それ以外 = その部署IDを持つメンバーのみ
        let targetMemberIds = null;
        let activeDeptName = '';

        if (selectedDeptId !== null) {
          const deptInfo = featuredDepts.find(d => d.id === selectedDeptId);
          activeDeptName = deptInfo ? deptInfo.name : selectedDeptId;
          targetMemberIds = new Set();
          Object.entries(memberMap).forEach(([sq, info]) => {
            if (info.departmentIds.includes(selectedDeptId)) {
              targetMemberIds.add(sq);
            }
          });
        }

        // 3. 評価データを集計（フィルタ適用済み）
        const aggregated = {};
        evaluations.forEach(row => {
          const empId = String(row.Evaluatee_ID || '').trim();
          if (!empId) return;

          // 部署フィルタ: 対象メンバーでなければスキップ
          if (targetMemberIds && !targetMemberIds.has(empId)) return;

          if (!aggregated[empId]) {
            const memberInfo = memberMap[empId];
            aggregated[empId] = {
              empId,
              name: memberInfo ? memberInfo.name : `背番号: ${empId}`,
              count: 0,
              scores: {}
            };
            topics.forEach(t => { aggregated[empId].scores[t] = 0; });
          }
          
          aggregated[empId].count += 1;
          topics.forEach(t => {
            aggregated[empId].scores[t] += (Number(row[t]) || 0);
          });
        });

        // 4. 平均スコア算出 + 「総合」算出
        const resultList = Object.values(aggregated).map(emp => {
          const avgScores = {};
          let totalSum = 0;

          topics.forEach(t => {
            const avg = Number((emp.scores[t] / emp.count).toFixed(2));
            avgScores[t] = avg;
            totalSum += avg;
          });

          // 「総合」= 全項目の平均値の平均
          avgScores['総合'] = Number((totalSum / topics.length).toFixed(2));

          return {
            empId: emp.empId,
            name: emp.name,
            avgScores,
            ranks: {},
            flags: {}
          };
        });

        // 5. 順位計算（総合 + 各項目）
        computeRanksAndFlags(resultList, allColumns);

        // 背番号の数値順でソート
        const sorted = resultList.sort((a, b) => {
          const numA = parseInt(a.empId, 10);
          const numB = parseInt(b.empId, 10);
          if (!isNaN(numA) && !isNaN(numB)) return numA - numB;
          return a.empId.localeCompare(b.empId);
        });

        return { processedData: sorted, featuredDepts, activeDeptName };
      }, [apiData, selectedDeptId]);


      // ========================================================
      // セルの色分けスタイル計算
      // ========================================================
      function getCellStyle(flags) {
        const base = "px-3 py-3 border-r border-slate-800/50 text-center transition-colors duration-200 ";
        if (flags.isTop1) {
          return base + "bg-cyan-900/20 text-cyan-300 font-bold shadow-[inset_0_0_12px_rgba(34,211,238,0.15)] ";
        } else if (flags.isTop3) {
          return base + "bg-blue-900/20 text-blue-300 font-bold ";
        } else if (flags.isBottom3) {
          return base + "bg-red-950/40 text-red-400/90 font-medium ";
        }
        return base + "text-slate-400 ";
      }

      function getRankStyle(flags) {
        const base = "px-3 py-3 border-r border-slate-800/50 text-center transition-colors duration-200 ";
        if (flags.isTop1) {
          return base + "bg-cyan-900/20 text-cyan-300 font-bold shadow-[inset_0_0_12px_rgba(34,211,238,0.15)] ";
        } else if (flags.isTop3) {
          return base + "bg-blue-900/20 text-blue-300 font-bold ";
        } else if (flags.isBottom3) {
          return base + "bg-red-950/40 text-red-400/90 font-medium ";
        }
        return base + "text-slate-500 ";
      }


      // ========================================================
      // 描画
      // ========================================================

      if (isLoading) {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen">
            <div className="loader mb-4"></div>
            <p className="text-cyan-400 font-medium">GAS Web Apps からデータを読み込み中...</p>
          </div>
        );
      }

      if (error) {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen">
            <div className="bg-red-900/30 border border-red-500/50 rounded-xl p-8 max-w-lg text-center shadow-lg">
              <svg className="w-12 h-12 text-red-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
              <h3 className="text-xl font-bold text-red-400 mb-2">エラーが発生しました</h3>
              <p className="text-slate-300 text-sm whitespace-pre-wrap">{error}</p>
            </div>
          </div>
        );
      }

      if (processedData.length === 0) {
        return (
          <div className="flex flex-col items-center justify-center min-h-screen">
            <p className="text-slate-400">データがありません。</p>
          </div>
        );
      }

      return (
        <div className="w-full p-4 md:p-8 font-sans">
          
          {/* ヘッダーエリア */}
          <div className="mb-4 flex flex-col md:flex-row md:items-center justify-between max-w-[95vw] mx-auto gap-4">
            <div>
              <h2 className="text-3xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-cyan-300 tracking-tight drop-shadow-[0_0_15px_rgba(59,130,246,0.3)]">
                360° Evaluation Matrix
              </h2>
              <p className="text-slate-400 mt-2 text-sm tracking-wide">ライブデータ連動: GAS Web Apps</p>
            </div>
            
            <div className="flex items-center space-x-2">
              <span className="relative flex h-3 w-3">
                <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-cyan-400 opacity-75"></span>
                <span className="relative inline-flex rounded-full h-3 w-3 bg-cyan-500"></span>
              </span>
              <span className="text-sm font-medium text-cyan-400 bg-cyan-950/50 px-4 py-1.5 rounded-full border border-cyan-800/50 shadow-[0_0_15px_rgba(34,211,238,0.15)] backdrop-blur-sm">
                対象メンバー: {processedData.length} 名
              </span>
            </div>
          </div>

          {/* 母集団切り替えタブ */}
          {featuredDepts.length > 0 && (
            <div className="mb-5 max-w-[95vw] mx-auto">
              <p className="text-xs text-slate-500 mb-2 uppercase tracking-widest font-medium">母集団を絞る</p>
              <div className="flex items-center gap-2 flex-wrap">
                {/* 「全員」タブ */}
                <button
                  onClick={() => setSelectedDeptId(null)}
                  className={
                    selectedDeptId === null
                      ? "px-4 py-1.5 rounded-full text-sm font-semibold border transition-all duration-200 bg-cyan-500/20 border-cyan-400/60 text-cyan-300 shadow-[0_0_12px_rgba(34,211,238,0.25)]"
                      : "px-4 py-1.5 rounded-full text-sm font-medium border transition-all duration-200 bg-slate-800/60 border-slate-600/40 text-slate-400 hover:border-slate-500/60 hover:text-slate-300"
                  }
                >
                  全員
                </button>

                {/* 各 feature 部署タブ */}
                {featuredDepts.map(dept => (
                  <button
                    key={dept.id}
                    onClick={() => setSelectedDeptId(dept.id)}
                    className={
                      selectedDeptId === dept.id
                        ? "px-4 py-1.5 rounded-full text-sm font-semibold border transition-all duration-200 bg-blue-500/20 border-blue-400/60 text-blue-300 shadow-[0_0_12px_rgba(59,130,246,0.25)]"
                        : "px-4 py-1.5 rounded-full text-sm font-medium border transition-all duration-200 bg-slate-800/60 border-slate-600/40 text-slate-400 hover:border-slate-500/60 hover:text-slate-300"
                    }
                  >
                    {dept.name}
                  </button>
                ))}
              </div>

              {/* アクティブフィルターの表示 */}
              {selectedDeptId !== null && (
                <p className="mt-2 text-xs text-blue-400/80">
                  🔍 <span className="font-semibold">{activeDeptName}</span> に所属するメンバーを表示中
                </p>
              )}
            </div>
          )}

          {/* 凡例 */}
          <div className="mb-4 flex items-center space-x-6 max-w-[95vw] mx-auto text-xs text-slate-500">
            <span className="flex items-center gap-1.5">
              <span className="inline-block w-3 h-3 rounded bg-cyan-900/40 border border-cyan-600/30"></span>
              Top 1
            </span>
            <span className="flex items-center gap-1.5">
              <span className="inline-block w-3 h-3 rounded bg-blue-900/40 border border-blue-600/30"></span>
              Top 3
            </span>
            <span className="flex items-center gap-1.5">
              <span className="inline-block w-3 h-3 rounded bg-red-950/60 border border-red-600/30"></span>
              Bottom 3
            </span>
          </div>

          {/* テーブルコンテナ */}
          <div className="overflow-auto w-full max-w-[95vw] mx-auto max-h-[75vh] border border-slate-800/80 rounded-xl shadow-2xl bg-slate-900/50 backdrop-blur-md relative scroll-smooth ring-1 ring-white/5">
            <table className="min-w-max w-full border-collapse text-sm">
              
              {/* ===== ヘッダー ===== */}
              <thead className="sticky top-0 z-40">
                <tr>
                  {/* ID列（sticky） */}
                  <th rowSpan={2} className="px-5 py-4 border-b border-r border-slate-700/50 bg-slate-900/95 backdrop-blur text-blue-300 sticky left-0 z-50 w-20 min-w-[5rem] align-middle font-semibold uppercase tracking-wider text-xs">
                    ID
                  </th>
                  {/* 名前列（sticky） */}
                  <th rowSpan={2} className="px-5 py-4 border-b border-r border-slate-700/50 bg-slate-900/95 backdrop-blur text-blue-300 sticky left-20 z-50 w-36 min-w-[9rem] align-middle font-semibold uppercase tracking-wider text-xs shadow-[4px_0_15px_-5px_rgba(0,0,0,0.6)]">
                    Name
                  </th>
                  
                  {/* 総合列ヘッダー（強調） */}
                  <th colSpan={2} className="px-4 py-3 border-b border-r-2 border-slate-600/80 bg-gradient-to-b from-blue-900/60 to-slate-900/95 backdrop-blur text-cyan-200 text-center whitespace-nowrap font-bold tracking-wide text-base">
                    ★ 総合
                  </th>

                  {/* 各項目ヘッダー */}
                  {topics.map(topic => (
                    <th key={topic} colSpan={2} className="px-4 py-3 border-b border-r border-slate-700/50 bg-slate-900/95 backdrop-blur text-slate-200 text-center whitespace-nowrap font-medium tracking-wide">
                      {topic}
                    </th>
                  ))}
                </tr>
                <tr>
                  {/* 総合のサブヘッダー */}
                  <th className="px-3 py-2 border-b border-r border-slate-600/80 bg-blue-950/70 backdrop-blur text-cyan-300/80 text-center font-normal text-xs whitespace-nowrap">
                    評価
                  </th>
                  <th className="px-3 py-2 border-b border-r-2 border-slate-600/80 bg-blue-950/70 backdrop-blur text-cyan-300/80 text-center font-normal text-xs whitespace-nowrap">
                    順位
                  </th>

                  {/* 各項目のサブヘッダー */}
                  {topics.map(topic => (
                    <React.Fragment key={`${topic}-sub`}>
                      <th className="px-3 py-2 border-b border-r border-slate-700/50 bg-slate-800/90 backdrop-blur text-slate-400 text-center font-normal text-xs whitespace-nowrap">
                        評価
                      </th>
                      <th className="px-3 py-2 border-b border-r border-slate-700/50 bg-slate-800/90 backdrop-blur text-slate-400 text-center font-normal text-xs whitespace-nowrap">
                        順位
                      </th>
                    </React.Fragment>
                  ))}
                </tr>
              </thead>

              {/* ===== ボディ ===== */}
              <tbody className="bg-transparent">
                {processedData.map((row) => (
                  <tr key={row.empId} className="hover:bg-slate-800/70 border-b border-slate-800/50 transition-all duration-200 group">
                    {/* ID（sticky） */}
                    <td className="px-5 py-3 border-r border-slate-800/50 sticky left-0 z-20 bg-slate-900 group-hover:bg-slate-800/90 font-mono text-slate-400 font-medium transition-colors">
                      {row.empId}
                    </td>
                    {/* 名前（sticky） */}
                    <td className="px-5 py-3 border-r border-slate-800/50 sticky left-20 z-20 bg-slate-900 group-hover:bg-slate-800/90 font-bold text-slate-200 shadow-[4px_0_15px_-5px_rgba(0,0,0,0.6)] transition-colors">
                      {row.name}
                    </td>
                    
                    {/* 総合列（強調ボーダー） */}
                    <td className={getCellStyle(row.flags['総合']).replace('border-r border-slate-800/50', 'border-r border-slate-700/60') + " bg-slate-800/30 "}>
                      {row.avgScores['総合'].toFixed(2)}
                    </td>
                    <td className={getRankStyle(row.flags['総合']).replace('border-r border-slate-800/50', 'border-r-2 border-slate-600/80') + " bg-slate-800/30 "}>
                      {row.ranks['総合']}位
                    </td>

                    {/* 各項目 */}
                    {topics.map(topic => (
                      <React.Fragment key={topic}>
                        <td className={getCellStyle(row.flags[topic])}>{row.avgScores[topic].toFixed(2)}</td>
                        <td className={getRankStyle(row.flags[topic])}>{row.ranks[topic]}位</td>
                      </React.Fragment>
                    ))}
                  </tr>
                ))}
              </tbody>

            </table>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<DashboardGrid />);
  </script>
</body>
</html>
